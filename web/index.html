<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Library Management System</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #ffffff;
      color: #4B0082;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      background-color: #E6E6FA;
      border-bottom: 3px solid #AD49E1;
      box-shadow: 0 4px 12px rgba(173, 73, 225, 0.2);
    }
    .navbar-brand { color: #4B0082 !important; font-weight: 700; }
    .nav-link { color: #4B0082 !important; font-weight: 600; transition: color 0.3s ease; }
    .nav-link:hover { color: #AD49E1 !important; }

    /* Floating books */
    .floating-books {
      position: fixed;
      width: 100%; height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
    .book {
      position: absolute;
      bottom: -60px;
      font-size: 30px;
      opacity: 0.25; /* Increased visibility */
      color: #AD49E1;
      animation: floatUp linear infinite;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    .book:nth-child(1) { left: 5%; animation-duration: 12s; }
    .book:nth-child(2) { left: 15%; font-size: 35px; animation-duration: 14s; animation-delay: 2s; }
    .book:nth-child(3) { left: 25%; font-size: 40px; animation-duration: 16s; animation-delay: 4s; }
    .book:nth-child(4) { left: 40%; font-size: 30px; animation-duration: 13s; animation-delay: 0.9s; }
    .book:nth-child(5) { left: 55%; font-size: 35px; animation-duration: 15s; animation-delay: 3s; }
    .book:nth-child(6) { left: 70%; font-size: 30px; animation-duration: 17s; animation-delay: 5s; }
    .book:nth-child(7) { left: 85%; font-size: 40px; animation-duration: 12s; animation-delay: 2s; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.25; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* Main content */
    .centered {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 4rem;
    }
    h1 {
      font-weight: 700;
      font-size: 3rem;
      letter-spacing: 1.5px;
      color: #4B0082;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.1);
    }
    p.lead {
      font-weight: 500;
      font-size: 1.2rem;
      margin-bottom: 1.5em;
      color: #4B0082;
      opacity: 0.9;
    }

    /* Buttons */
    .btn-login {
      width: 180px;
      margin: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      background-color: #4B0082;
      color: #fff;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }
    .btn-login:hover { transform: scale(1.08); background-color: #8B5FBF; }
    .btn-outline-style {
      background-color: transparent;
      border: 2px solid #4B0082;
      color: #4B0082;
    }
    .btn-outline-style:hover { background-color: #8B5FBF; color: #fff; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">📚 MyLibrary</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fa-solid fa-house"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="admin/adminLogin.jsp"><i class="fa-solid fa-user-shield"></i>Admin Login</a></li>
          <li class="nav-item"><a class="nav-link" href="user/userLogin.jsp"><i class="fa-solid fa-user"></i>User Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Floating books -->
  <div class="floating-books" aria-hidden="true">
    <div class="book">📚</div>
    <div class="book">📖</div>
    <div class="book">📚</div>
    <div class="book">📖</div>
    <div class="book">📚</div>
    <div class="book">📖</div>
    <div class="book">📚</div>
      <div class="book">📖</div>
    <div class="book">📚</div>
      <div class="book">📖</div>
    <div class="book">📚</div>
  </div>

  <!-- Main content -->
  <div class="centered animate__animated animate__fadeInDown">
    <h1>Welcome to <br>Online Library Management System</h1>
    <p class="lead">Choose your login portal</p>
    <div>
      <a href="admin/adminLogin.jsp" class="btn btn-login">Admin Login</a>
      <a href="user/userLogin.jsp" class="btn btn-outline-style btn-login">User Login</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
